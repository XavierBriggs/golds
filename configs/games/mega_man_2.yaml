# Mega Man 2 (NES) Configuration

name: mega_man_2
description: "Mega Man 2 (NES) - requires ROM import"

environment:
  platform: retro
  game_id: mega_man_2
  n_envs: 16
  terminal_on_life_loss: false
  clip_reward: false
  reward_regime: raw
  action_set: platformer
  sticky_action_prob: 0.25
  x_pos_reward_scale: 0.1
  death_penalty: -1.0
  time_penalty: -0.001

ppo:
  learning_rate: 3e-4
  n_steps: 512
  ent_coef: 0.005
  batch_size: 256
  clip_range: 0.2
  lr_schedule: linear
  clip_schedule: linear

training:
  total_timesteps: 100000000
  eval_freq: 100000
  eval_episodes: 5
  save_freq: 500000
  seed: 42
  video_freq: 10000000

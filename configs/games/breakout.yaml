# Breakout (Atari) Configuration

name: breakout
description: "Breakout Atari 2600 - classic paddle game"

environment:
  platform: atari
  game_id: breakout
  n_envs: 8
  terminal_on_life_loss: true

ppo:
  learning_rate: 2.5e-4
  n_steps: 128
  ent_coef: 0.01

training:
  total_timesteps: 10000000
  eval_freq: 50000
  seed: 42

# Tetris (Game Boy) Configuration

name: tetris
description: "Tetris (Game Boy) with PPO - requires ROM import"

environment:
  platform: retro
  game_id: tetris
  n_envs: 24
  terminal_on_life_loss: false
  state: null  # Uses registry default (Level0.TypeA)
  clip_reward: false
  reward_regime: raw

ppo:
  learning_rate: 2.5e-4
  n_steps: 128
  ent_coef: 0.001
  batch_size: 256
  lr_schedule: linear
  clip_schedule: linear

training:
  # Round 2 long-form target
  total_timesteps: 30000000
  eval_freq: 200000
  eval_episodes: 3
  eval_deterministic: false
  save_freq: 500000
  seed: 42

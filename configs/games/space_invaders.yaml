# Space Invaders (Atari) Configuration

name: space_invaders
description: "Space Invaders Atari 2600 with DeepMind PPO settings"

environment:
  platform: atari
  game_id: space_invaders
  n_envs: 16
  terminal_on_life_loss: true

ppo:
  # Standard DeepMind settings work well for Space Invaders
  learning_rate: 2.5e-4
  n_steps: 128
  ent_coef: 0.01

training:
  # Round 2 long-form target
  total_timesteps: 30000000
  eval_freq: 100000
  eval_episodes: 10
  save_freq: 500000
  seed: 42

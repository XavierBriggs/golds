# Super Mario Bros. 2 Japan / "Lost Levels" (NES) Configuration

name: super_mario_bros_2_japan
description: "Super Mario Bros. 2 Japan (Lost Levels) NES with PPO - requires ROM import"

environment:
  platform: retro
  game_id: super_mario_bros_2_japan
  n_envs: 16
  terminal_on_life_loss: false
  state: null  # Uses default Level1-1

ppo:
  learning_rate: 2.5e-4
  n_steps: 128
  ent_coef: 0.001
  batch_size: 256

training:
  total_timesteps: 20000000
  eval_freq: 100000
  seed: 42

# Street Fighter II (Genesis) Configuration

name: street_fighter_ii
description: "Street Fighter II Special Champion Edition (Genesis) - requires ROM import"

environment:
  platform: retro
  game_id: street_fighter_ii
  n_envs: 24
  terminal_on_life_loss: false
  reward_regime: clipped
  players: 2
  opponent: self_play
  state: null

ppo:
  learning_rate: 2.5e-4
  n_steps: 128
  ent_coef: 0.001
  batch_size: 256

training:
  total_timesteps: 30000000
  eval_freq: 200000
  eval_episodes: 3
  eval_deterministic: false
  save_freq: 500000
  self_play_snapshot_freq: 500000
  self_play_max_snapshots: 5
  seed: 42

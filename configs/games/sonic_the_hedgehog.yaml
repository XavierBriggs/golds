# Sonic the Hedgehog (Genesis) Configuration

name: sonic_the_hedgehog
description: "Sonic the Hedgehog (Genesis) PPO - requires ROM import"

environment:
  platform: retro
  game_id: sonic_the_hedgehog
  n_envs: 24
  terminal_on_life_loss: false
  state: null  # Uses registry default (GreenHillZone.Act1)
  clip_reward: false
  reward_regime: raw
  action_set: platformer
  # --- Tier-1 config alignment (iteration 3, 2026-07-21) ---------------------
  # research-backed changes to match the proven gym-retro Sonic recipe, aimed
  # at the ~40% GHZ Act 1 stall seen in prior iterations. See
  # research-workspace/REPORT.md for the full writeup. Three changes:
  #  1. stochastic_frameskip {2,3,4} (instead of a fixed skip): timing noise
  #     breaks the deterministic freeze/oscillation loops the agent gets
  #     stuck in. This now provides the exploration noise, so sticky actions
  #     are turned off (the benchmark recipe uses one mechanism, not both).
  #  2. x_pos_reward_scale 0.01 (was 0.1): canonical Sonic reward scale,
  #     keeping the Retro Contest ~9:1 progress:completion ratio.
  #  3. stall_limit 600: anti-stall timeout so an episode that stops making
  #     forward progress for ~600 steps truncates instead of running out the
  #     clock frozen/oscillating.
  stochastic_frameskip: true
  frameskip_min: 2
  frameskip_max: 4
  sticky_action_prob: 0.0
  x_pos_reward_scale: 0.01
  death_penalty: -1.0
  collectible_reward_scale: 0.01
  time_penalty: -0.001
  progress_mode: delta_max_x  # ADR-004: reward only new furthest-right progress
  # GHZ Act 1 end-x, measured from the ROM info dict on ithaca 2026-07-18:
  # screen_x_end=9407 (Sonic starts at x=80). Completion fires on EITHER
  # x >= level_end_x OR the game's own level-clear flag (level_end_bonus > 0).
  level_end_x: 9407
  completion_bonus: 10.0
  # level_end_bonus is Sonic's end-of-level time bonus: 0 during the level,
  # non-zero the moment Sonic touches the end signpost. Robust clear signal.
  level_end_info_key: level_end_bonus
  stall_limit: 600

ppo:
  # Run #2 tuning (2026-07-20): run #1 peaked ~1120 then decayed to ~779 with
  # approx_kl over the 0.05 ceiling (unstable late updates), and the
  # deterministic policy got stuck at x~3895/9407. Lower LR for stability
  # (fix #3), raise ent_coef for exploration to escape the stuck point (fix #2).
  learning_rate: 2.0e-4
  n_steps: 512
  ent_coef: 0.01
  batch_size: 256
  clip_range: 0.2
  lr_schedule: linear
  clip_schedule: linear

training:
  # First M3 iteration is right-sized to the estimate (10-30M for GHZ1);
  # extend if the run shows learning but not completion. 20M ~= 2.8h at 2000/s.
  total_timesteps: 20000000
  # eval_episodes is shared by periodic and final eval, and 100 sequential
  # episodes in single-emulator retro is expensive, so eval_freq is kept high
  # (few periodic evals). The final 100-ep deterministic eval at run end is the
  # north-star completion-rate measurement (R6/R11).
  eval_freq: 5000000
  eval_episodes: 100
  eval_deterministic: true
  save_freq: 2000000
  seed: 42
  video_freq: 5000000

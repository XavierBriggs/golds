# Sonic the Hedgehog (Genesis) Configuration

name: sonic_the_hedgehog
description: "Sonic the Hedgehog (Genesis) PPO - requires ROM import"

environment:
  platform: retro
  game_id: sonic_the_hedgehog
  n_envs: 24
  terminal_on_life_loss: false
  state: null  # Uses registry default (GreenHillZone.Act1)
  clip_reward: false
  reward_regime: raw
  x_pos_reward_scale: 0.1

ppo:
  learning_rate: 2.5e-4
  n_steps: 256
  ent_coef: 0.005
  batch_size: 256
  lr_schedule: linear
  clip_schedule: linear

training:
  # Round 2 long-form target
  total_timesteps: 50000000
  eval_freq: 200000
  # Keep eval short so queues/watchdogs don't think the process is hung.
  eval_episodes: 3
  # Retro platformers can look "stuck" under deterministic eval early on.
  eval_deterministic: false
  save_freq: 500000
  seed: 42

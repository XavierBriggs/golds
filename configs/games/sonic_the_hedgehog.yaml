# Sonic the Hedgehog (Genesis) Configuration

name: sonic_the_hedgehog
description: "Sonic the Hedgehog (Genesis) PPO - requires ROM import"

environment:
  platform: retro
  game_id: sonic_the_hedgehog
  n_envs: 24
  terminal_on_life_loss: false
  state: null  # Uses registry default (GreenHillZone.Act1)
  clip_reward: false
  reward_regime: raw
  action_set: platformer
  sticky_action_prob: 0.25
  x_pos_reward_scale: 0.1
  death_penalty: -1.0
  collectible_reward_scale: 0.01
  time_penalty: -0.001
  progress_mode: delta_max_x  # ADR-004: reward only new furthest-right progress
  # level_end_x is the GHZ Act 1 end-x threshold. Placeholder None disables
  # threshold-based completion detection until this is measured from the ROM
  # on ithaca (M0 precondition, docs/inception/spec.md). Sonic x-position can
  # be large; do not guess this value.
  level_end_x: null
  completion_bonus: 100.0
  # level_end_info_key: set once/if stable-retro's data.json for this game
  # exposes a level/act-change signal; null disables this alternate signal.
  level_end_info_key: null

ppo:
  learning_rate: 3e-4
  n_steps: 512
  ent_coef: 0.005
  batch_size: 256
  clip_range: 0.2
  lr_schedule: linear
  clip_schedule: linear

training:
  total_timesteps: 100000000
  eval_freq: 200000
  # R6: fixed from eval_episodes=3 / eval_deterministic=false to the spec'd
  # 100-episode deterministic eval. Note the tradeoff before an M3 ithaca
  # run: eval_episodes is also used by the *periodic* in-training eval
  # (every eval_freq steps), so this makes every periodic eval run 100
  # sequential episodes in a single-emulator retro env instead of 3 --
  # meaningfully more wall-clock overhead across ~500 evals in a 100M-step
  # run. Reduce eval_freq if that overhead is too high in practice.
  eval_episodes: 100
  eval_deterministic: true
  save_freq: 500000
  seed: 42
  video_freq: 10000000

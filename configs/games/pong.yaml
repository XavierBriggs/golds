# Pong (Atari) Configuration

name: pong
description: "Pong Atari 2600 - simple paddle game, good for testing"

environment:
  platform: atari
  game_id: pong
  n_envs: 16
  terminal_on_life_loss: false  # Pong doesn't have lives
  reward_regime: clipped

ppo:
  learning_rate: 3e-4
  n_steps: 512
  ent_coef: 0.01
  clip_range: 0.2
  lr_schedule: linear
  clip_schedule: linear

training:
  total_timesteps: 5000000
  eval_freq: 25000
  seed: 42

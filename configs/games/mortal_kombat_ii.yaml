# Mortal Kombat II (Genesis) Configuration

name: mortal_kombat_ii
description: "Mortal Kombat II (Genesis) with PPO - requires ROM import"

environment:
  platform: retro
  game_id: mortal_kombat_ii
  n_envs: 24
  terminal_on_life_loss: false
  # Round 2: PvP/self-play state
  players: 2
  opponent: self_play
  state: Level1.LiuKangVsJax.2P

ppo:
  learning_rate: 2.5e-4
  n_steps: 128
  ent_coef: 0.001
  batch_size: 256

training:
  # Round 2 long-form target + self-play snapshots for opponents
  total_timesteps: 30000000
  eval_freq: 200000
  eval_episodes: 3
  eval_deterministic: false
  save_freq: 500000
  self_play_snapshot_freq: 500000
  self_play_max_snapshots: 5
  seed: 42

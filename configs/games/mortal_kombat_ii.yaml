# Mortal Kombat II (Genesis) Configuration

name: mortal_kombat_ii
description: "Mortal Kombat II (Genesis) with PPO - requires ROM import"

environment:
  platform: retro
  game_id: mortal_kombat_ii
  n_envs: 24
  terminal_on_life_loss: false
  players: 2
  opponent: self_play
  state: Level1.SubzeroVsRaiden.2P
  clip_reward: false
  reward_regime: raw
  action_set: fighter
  sticky_action_prob: 0.25
  max_episode_steps: 10000

ppo:
  learning_rate: 3e-4
  n_steps: 512
  ent_coef: 0.005
  batch_size: 256
  clip_range: 0.2
  lr_schedule: linear
  clip_schedule: linear

training:
  total_timesteps: 30000000
  eval_freq: 200000
  eval_episodes: 3
  eval_deterministic: false
  save_freq: 500000
  self_play_snapshot_freq: 500000
  self_play_max_snapshots: 5
  seed: 42
  video_freq: 10000000

# Super Mario Bros (NES) Configuration

name: super_mario_bros
description: "Super Mario Bros NES with PPO - requires ROM import"

environment:
  platform: retro
  game_id: super_mario_bros
  n_envs: 16
  # Mario doesn't use arcade-style lives system
  terminal_on_life_loss: false
  state: null  # Uses default Level1-1
  clip_reward: false
  reward_regime: raw
  x_pos_reward_scale: 0.1

ppo:
  learning_rate: 2.5e-4
  n_steps: 256
  ent_coef: 0.005
  batch_size: 256
  lr_schedule: linear
  clip_schedule: linear

training:
  # Platformers often need more training time
  total_timesteps: 20000000
  eval_freq: 100000
  seed: 42
